<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>Stat Block</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: #ffffff;
        }

        .stat-block {
            display: inline-block;
            width: 400px;
            margin: 0;
        }

        .stat-block .bar {
            height: 5px;
            background: #E69A28;
            border: 1px solid #000;
            position: relative;
            z-index: 1;
        }

        .stat-block .content-wrap {
            font-family: 'Noto Sans', 'Myriad Pro', Calibri, Helvetica, Arial, sans-serif;
            font-size: 13.5px;
            background: #FDF1DC;
            padding: 0.6em;
            padding-bottom: 0.5em;
            border: 1px #DDD solid;
            box-shadow: 0 0 1.5em #867453;
            position: relative;
            z-index: 0;
            margin-left: 2px;
            margin-right: 2px;
        }

        .creature-heading h1 {
            font-family: 'Georgia', serif;
            color: #7A200D;
            font-weight: 700;
            margin: 0px;
            font-size: 23px;
            letter-spacing: 1px;
            font-variant: small-caps;
        }

        .creature-heading h2 {
            font-weight: normal;
            font-style: italic;
            font-size: 12px;
            margin: 0;
        }

        .tapered-rule {
            display: block;
            width: 100%;
            height: 5px;
            border: none;
            color: #922610;
            background-color: #922610;
            margin-top: 0.6em;
            margin-bottom: 0.35em;
            background: linear-gradient(to right, #922610, #922610 50%, transparent);
        }

        .top-stats {
            color: #7A200D;
        }

        .property-line {
            line-height: 1.4;
            display: block;
            text-indent: -1em;
            padding-left: 1em;
        }

        .property-line h4 {
            margin: 0;
            display: inline;
            font-weight: bold;
        }

        .property-line p {
            display: inline;
            margin: 0;
        }

        .property-block {
            margin-top: 0.3em;
            margin-bottom: 0.9em;
            line-height: 1.5;
            display: block;
        }

        .property-block h4 {
            margin: 0;
            display: inline;
            font-weight: bold;
            font-style: italic;
        }

        .property-block p {
            display: inline;
            margin: 0;
        }

        .abilities-table {
            width: 100%;
            border: 0px;
            border-collapse: collapse;
            text-align: center;
            color: #7A200D;
        }

        .abilities-table th, .abilities-table td {
            width: 50px;
            text-align: center;
            padding: 4px;
        }

        .section-header {
            border-bottom: 1px solid #7A200D;
            color: #7A200D;
            font-size: 21px;
            font-variant: small-caps;
            font-weight: normal;
            letter-spacing: 1px;
            margin: 0;
            margin-bottom: 0.3em;
            margin-top: 0.6em;
        }
    </style>
</head>
<body>
