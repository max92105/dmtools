<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>Stat Block</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: #080000;
            scrollbar-face-color: #E69A28;
            scrollbar-track-color: #100400;
            scrollbar-arrow-color: #100400;
            scrollbar-shadow-color: #100400;
            scrollbar-3dlight-color: #100400;
            scrollbar-darkshadow-color: #100400;
            scrollbar-highlight-color: #B87820;
            scrollbar-width: thin;
        }

        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: #100400;
        }
        ::-webkit-scrollbar-thumb {
            background: #77E69A28;
            border-radius: 2px;
        }

        .stat-block {
            display: inline-block;
            width: 100%;
            max-width: 460px;
            margin: 0;
            box-sizing: border-box;
        }

        .stat-block .bar {
            height: 5px;
            background: #E69A28;
            border: 1px solid #3a1800;
            position: relative;
            z-index: 1;
        }

        .stat-block .content-wrap {
            font-family: 'Georgia', 'Noto Sans', Calibri, serif;
            font-size: 13.5px;
            color: #F0E6D3;
            background: #150800;
            padding: 0.6em;
            padding-bottom: 0.5em;
            border: 1px solid #55E69A28;
            box-shadow: 0 0 1.5em #00000088;
            position: relative;
            z-index: 0;
            margin-left: 2px;
            margin-right: 2px;
        }

        .creature-heading h1 {
            font-family: 'Georgia', serif;
            color: #E69A28;
            font-weight: 700;
            margin: 0px;
            font-size: 23px;
            letter-spacing: 1px;
            font-variant: small-caps;
        }

        .creature-heading h2 {
            font-weight: normal;
            font-style: italic;
            font-size: 12px;
            color: #C8A878;
            margin: 0;
        }

        .tapered-rule {
            display: block;
            width: 100%;
            height: 5px;
            border: none;
            margin-top: 0.6em;
            margin-bottom: 0.35em;
            background: linear-gradient(to right, #E69A28, #E69A28 50%, transparent);
        }

        .top-stats {
            color: #E6C88A;
        }

        .top-stats h4 {
            color: #E69A28;
        }

        .property-line {
            line-height: 1.4;
            display: block;
            text-indent: -1em;
            padding-left: 1em;
            color: #F0E6D3;
        }

        .property-line h4 {
            margin: 0;
            display: inline;
            font-weight: bold;
            color: #E69A28;
        }

        .property-line p {
            display: inline;
            margin: 0;
        }

        .property-block {
            margin-top: 0.3em;
            margin-bottom: 0.9em;
            line-height: 1.5;
            display: block;
            color: #F0E6D3;
        }

        .property-block h4 {
            margin: 0;
            display: inline;
            font-weight: bold;
            font-style: italic;
            color: #E6C88A;
        }

        .property-block p {
            display: inline;
            margin: 0;
        }

        .abilities-table {
            width: 100%;
            border: 0px;
            border-collapse: collapse;
            text-align: center;
            color: #E6C88A;
        }

        .abilities-table th {
            color: #E69A28;
            font-size: 13px;
            padding: 4px;
        }

        .abilities-table td {
            width: 50px;
            text-align: center;
            padding: 4px;
            color: #F0E6D3;
        }

        .section-header {
            border-bottom: 1px solid #55E69A28;
            color: #E69A28;
            font-size: 21px;
            font-variant: small-caps;
            font-weight: normal;
            letter-spacing: 1px;
            margin: 0;
            margin-bottom: 0.3em;
            margin-top: 0.6em;
        }
    </style>
</head>
<body>
